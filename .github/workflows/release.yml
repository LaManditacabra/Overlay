name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Clean electron-builder cache
        run: |
          Remove-Item "$env:LOCALAPPDATA\electron-builder\Cache\winCodeSign" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "$env:LOCALAPPDATA\electron-builder\Cache\default" -Recurse -Force -ErrorAction SilentlyContinue

      - name: Build app (portable + installer)
        run: npm run build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          WIN_CSC_LINK: ""
          CSC_LINK: ""

      - name: Publish Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/StreamChatOverlay-*-Setup.exe
            dist/StreamChatOverlay.zip
            dist/*.blockmap
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
